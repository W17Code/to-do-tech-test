<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ isEditing ? 'Editar Categoría' : 'Nueva Categoría' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" [disabled]="!categoryName.trim()" strong="true">
        Guardar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="form-container">
    <ion-input
      fill="outline"
      shape="round"
      label="Nombre de la categoría"
      labelPlacement="floating"
      placeholder="Ej: Trabajo, Personal, etc."
      [(ngModel)]="categoryName"
      autofocus="true"
      type="text"
    >
      <ion-icon slot="start" name="pricetag-outline" aria-hidden="true"></ion-icon>
    </ion-input>
  </div>

  <div class="color-section">
    <ion-label class="color-label">Elige un color para diferenciarla</ion-label>
    <div class="color-grid">
      @for (color of colors; track color) {
      <button
        class="color-circle"
        [style.background-color]="color"
        [class.selected]="selectedColor === color"
        (click)="selectedColor = color">
        @if (selectedColor === color) {
        <ion-icon name="checkmark" color="light"></ion-icon>
        }
      </button>
      }
    </div>
  </div>
</ion-content>
