<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ isEditing ? 'Editar Categoría' : 'Nueva Categoría' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" [disabled]="!categoryName.trim()" strong="true">
        Guardar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item>
      <ion-input
        label="Nombre"
        labelPlacement="stacked"
        placeholder="Nombre de la categoría"
        [(ngModel)]="categoryName"
        autofocus="true"
        type="text">
      </ion-input>
    </ion-item>
  </ion-list>

  <div class="color-section">
    <ion-label class="color-label">Color</ion-label>
    <div class="color-grid">
      @for (color of colors; track color) {
      <button
        class="color-circle"
        [style.background-color]="color"
        [class.selected]="selectedColor === color"
        (click)="selectedColor = color">
        @if (selectedColor === color) {
        <ion-icon name="checkmark" color="light"></ion-icon>
        }
      </button>
      }
    </div>
  </div>
</ion-content>
