<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ isEditing ? 'Editar Tarea' : 'Nueva Tarea' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="save()" [disabled]="!taskTitle.trim()" strong="true">
        Guardar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="form-container">
    <ion-input
      fill="outline"
      shape="round"
      label="Título de la tarea"
      labelPlacement="floating"
      placeholder="¿Qué necesitas hacer?"
      [(ngModel)]="taskTitle"
      autofocus="true"
      type="text"
    >
      <ion-icon slot="start" name="create-outline" aria-hidden="true"></ion-icon>
    </ion-input>

    @if (categoriesEnabled && categories.length > 0) {
      <ion-select
        fill="outline"
        shape="round"
        label="Categoría"
        labelPlacement="floating"
        placeholder="Selecciona una categoría"
        [(ngModel)]="selectedCategoryId"
        interface="action-sheet"
        [interfaceOptions]="{ header: 'Seleccionar Categoría' }"
      >
        <ion-icon slot="start" name="folder-open-outline" aria-hidden="true"></ion-icon>
        @for (cat of categories; track cat.id) {
          <ion-select-option [value]="cat.id">{{ cat.name }}</ion-select-option>
        }
      </ion-select>
    }
  </div>
</ion-content>
